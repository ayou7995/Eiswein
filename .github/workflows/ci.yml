name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy strict
        run: mypy --strict app

      - name: Pytest
        run: |
          # Generate dummy env values at runtime so nothing secret-shaped
          # lives in source. Real per-test values come from the `settings`
          # fixture in conftest.
          export ADMIN_USERNAME=admin
          export JWT_SECRET=$(python -c "import secrets; print(secrets.token_urlsafe(48))")
          export ENCRYPTION_KEY=$(python -c "import secrets, base64; print(base64.urlsafe_b64encode(secrets.token_bytes(32)).decode())")
          export ADMIN_PASSWORD_HASH=$(python -c "import bcrypt; print(bcrypt.hashpw(b'ci-placeholder', bcrypt.gensalt(rounds=4)).decode())")
          # Collection-only pass first — surfaces import/config errors without
          # running any test, making failures much easier to diagnose.
          pytest --collect-only -q tests
          pytest --tb=short tests

      - name: Alembic migration smoke test
        run: |
          mkdir -p data
          DATABASE_URL=sqlite:///./data/ci_smoke.db alembic upgrade head
          test -f ./data/ci_smoke.db
          rm -rf data

      - name: pip audit (non-blocking)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --strict

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript strict check
        run: npm run typecheck

      - name: Vitest
        run: npm test -- --run

      - name: Production build
        run: npm run build

      - name: npm audit (non-blocking)
        continue-on-error: true
        run: npm audit --audit-level=high

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          # gitleaks-action@v2 scans the commit range of a push (or PR).
          # A shallow clone (the default) makes the "before" commit
          # unreachable and gitleaks exits 1 with an opaque error.
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
