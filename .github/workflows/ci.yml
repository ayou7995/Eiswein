name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy strict
        run: mypy --strict app

      - name: Pytest
        env:
          # Settings() validates required fields even when tests pass
          # explicit kwargs, because pydantic-settings merges env vars.
          # These dummies satisfy the validators in app/config.py; real
          # per-test values come from the `settings` fixture in conftest.
          JWT_SECRET: "ci-dummy-jwt-secret-for-tests-at-least-32-chars-long-xyz"
          ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          ADMIN_USERNAME: "admin"
          ADMIN_PASSWORD_HASH: "$2b$12$CIdummyCIdummyCIdummyCIdummyCIdummyCIdummyCIdummyCIdum"
        run: pytest --tb=short tests

      - name: Alembic migration smoke test
        run: |
          mkdir -p data
          DATABASE_URL=sqlite:///./data/ci_smoke.db alembic upgrade head
          test -f ./data/ci_smoke.db
          rm -rf data

      - name: pip audit (non-blocking)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --strict

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript strict check
        run: npm run typecheck

      - name: Vitest
        run: npm test -- --run

      - name: Production build
        run: npm run build

      - name: npm audit (non-blocking)
        continue-on-error: true
        run: npm audit --audit-level=high

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
