[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # bugbear
    "UP",   # pyupgrade
    "SIM",  # simplify
    "S",    # bandit (security)
    "ASYNC",
    "RET",  # return
    "RUF",
]
ignore = [
    "S101",  # assert — allowed in tests
    "B008",  # function-call-in-default — FastAPI Depends idiom
]

# Traditional-Chinese punctuation is NEVER confusable in our user-facing
# strings — whitelist the fullwidth marks so RUF001 stops flagging them.
[tool.ruff.lint.flake8-implicit-str-concat]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S105", "S106", "S311"]  # hardcoded test secrets / weak random
"scripts/*" = ["S105", "S106"]
# Audit event-type constants look password-shaped to the bandit heuristic.
"app/db/repositories/audit_repository.py" = ["S105"]
# `token_type="access"|"refresh"` is an internal JWT claim, not a secret.
"app/security/auth.py" = ["S106"]
# User-facing Chinese error messages legitimately use fullwidth commas.
"app/security/exceptions.py" = ["RUF001"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
no_implicit_reexport = true
disallow_untyped_defs = true
disallow_any_unimported = true
check_untyped_defs = true
namespace_packages = true
explicit_package_bases = true

[[tool.mypy.overrides]]
module = ["zxcvbn.*", "slowapi.*", "jose.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
disallow_any_unimported = false
check_untyped_defs = true
warn_return_any = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --strict-markers"
pythonpath = ["."]
filterwarnings = [
    "ignore::DeprecationWarning",
]
