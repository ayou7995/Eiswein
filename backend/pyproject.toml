[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # bugbear
    "UP",   # pyupgrade
    "SIM",  # simplify
    "S",    # bandit (security)
    "ASYNC",
    "RET",  # return
    "RUF",
]
ignore = [
    "S101",  # assert — allowed in tests
    "B008",  # function-call-in-default — FastAPI Depends idiom
]

# Traditional-Chinese punctuation is NEVER confusable in our user-facing
# strings — whitelist the fullwidth marks so RUF001 stops flagging them.
[tool.ruff.lint.flake8-implicit-str-concat]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S105", "S106", "S311"]  # hardcoded test secrets / weak random
"scripts/*" = ["S105", "S106"]
# Audit event-type constants look password-shaped to the bandit heuristic.
"app/db/repositories/audit_repository.py" = ["S105"]
# `token_type="access"|"refresh"` is an internal JWT claim, not a secret.
"app/security/auth.py" = ["S106"]
# User-facing Chinese error messages legitimately use fullwidth commas.
"app/security/exceptions.py" = ["RUF001"]
"app/security/error_handlers.py" = ["RUF001"]
"app/db/repositories/watchlist_repository.py" = ["RUF001"]
# Indicator short_labels are Chinese UX strings (fullwidth parens/commas) and
# math helpers use Greek letters (α, σ) in docstrings — both intentional.
"app/indicators/*" = ["RUF001", "RUF002", "RUF003"]
"app/indicators/**/*.py" = ["RUF001", "RUF002", "RUF003"]
"tests/indicators/**/*.py" = ["RUF001", "RUF002", "RUF003"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
no_implicit_reexport = true
disallow_untyped_defs = true
disallow_any_unimported = true
check_untyped_defs = true
namespace_packages = true
explicit_package_bases = true

[[tool.mypy.overrides]]
module = [
    "zxcvbn.*",
    "slowapi.*",
    "jose.*",
    "yfinance.*",
    "fredapi.*",
    "pandas.*",
    "pandas_market_calendars.*",
    "tenacity.*",
]
ignore_missing_imports = true

# Modules that bridge pandas / yfinance / fredapi surfaces into typed code.
# Keep disallow_any_unimported=False here so pd.DataFrame flows through
# without manufacturing wrapper types — everywhere else stays strict.
[[tool.mypy.overrides]]
module = [
    "app.datasources.*",
    "app.ingestion.*",
    "app.indicators.*",
    "app.signals.*",
]
disallow_any_unimported = false
warn_return_any = false
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false
disallow_any_unimported = false
check_untyped_defs = true
warn_return_any = false

[tool.pytest.ini_options]
# Phase 1 introduces async ingestion + datasource tests. pytest-asyncio's
# auto mode treats every `async def` as an asyncio test so we don't need
# to sprinkle @pytest.mark.asyncio everywhere — but we keep the markers
# anyway for clarity, and they're still needed to silence 0.24+ warnings.
testpaths = ["tests"]
addopts = "-v --strict-markers"
pythonpath = ["."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore::DeprecationWarning",
]
