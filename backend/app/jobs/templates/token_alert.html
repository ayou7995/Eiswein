<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <title>Eiswein Broker Token 即將到期</title>
  </head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1f2937; background: #f9fafb; margin: 0; padding: 24px;">
    <div style="max-width: 560px; margin: 0 auto; background: #ffffff; border: 1px solid #fcd34d; border-left: 4px solid #d97706; border-radius: 8px; padding: 20px;">
      <h1 style="margin: 0 0 12px 0; font-size: 18px; color: #92400e;">Broker Token 即將到期</h1>
      <p style="margin: 0 0 12px 0; font-size: 14px;">
        {{ broker }} 連線憑證將於 <strong>{{ days_remaining }}</strong> 天後（{{ expires_at }}）到期。
      </p>
      <p style="margin: 0; font-size: 13px; color: #6b7280;">
        請登入 Eiswein → 設定 → 重新連接，以重新取得 refresh token。逾期後系統將自動降級使用 yfinance 資料，不影響日常分析。
      </p>
    </div>
  </body>
</html>
